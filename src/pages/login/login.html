<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lume/Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="../../styles/style.css">
</head>

<body>
 
    <main>

        <section class="login">
            <div class="login-esquerda">
                <div class="apresentacao">
                    <img class="logo-img" src="../../assets/images/icon.svg" alt="">
                    <span class="logo-nome">Lume</span>
                    <h2>Bem-vindo</h2>
                    <p>Entre para acessar sua conta e fazer pedidos</p>
                </div>

                <div class="form-login">
                    <form action="/login" method="post">
                        <div class="input-wrapper">
                            <img class="icone" src="../../assets/images/email.svg" alt="email">
                            <input class="input-login" type="email" id="email" name="email" placeholder="seu@email.com"
                                required>
                        </div>

                        <div class="input-wrapper">
                            <img class="icone" src="../../assets/images/cadeado.svg" alt="senha">
                            <input class="input-login" type="password" id="password" name="password"
                                placeholder="••••••••" required>
                        </div>

                        <button class="botao-login" type="submit">Entrar</button>

                        <div class="divisor">
                            <span>ou</span>
                        </div>

                        <button class="botao-google" type="button">
                            <img src="../../assets/images/Google-Logo.svg" alt="Google">
                            Continuar com Google
                        </button>

                    </form>

                    <p class="cadastro-link">
                        Não tem uma conta? <a href="../cadastro/cadastro.html">Cadastre-se</a>
                    </p>
                </div>
                </form>
            </div>
            </div>

            <div class="imagem-experiencia">
                <img src="../../assets/images/container.svg" alt="">
            </div>
        </section>

    </main>






</body>

</html>
