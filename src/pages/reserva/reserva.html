<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Artesanal | Reserva</title>
    <link rel="stylesheet" href="../../assets/fonts/fonts.css">
    <link rel="stylesheet" href="../../components/header/header.css">
    <link rel="stylesheet" href="../../components/botaoCadastro/botao.css">
    <link rel="stylesheet" href="reserva.css">
</head>

<body>
    <header>
    <nav class="logo">

    
      <div class="nav-brand">
        <svg class="logoIcon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7 10h18l-2 13H9L7 10Z" stroke="#3B2314" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M22 13h3a3 3 0 0 1 0 6h-3" stroke="#3B2314" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M10 7c0-2 2-2 2-4M15 7c0-2 2-2 2-4" stroke="#3B2314" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="7" y1="23" x2="25" y2="23" stroke="#3B2314" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <h1 class="logoNome">Lume</h1>
      </div>

      
      <button class="menu-hamburger" id="btn-mobile" aria-label="Abrir Menu" aria-expanded="false" aria-controls="menu-opcoes">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3B2314" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6"  x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <ul class="opcoes" id="menu-opcoes">
        <li class="item"><a href="../../../index.html">Início</a></li>
        <li class="item"><a href="../cardapio/cardapio.html" class="active">Cardápio</a></li>
        <li class="item"><a href="../nossa-historia/nossa-historia.html">Nossa História</a></li>
        <li class="item"><a href="../contato/contato.html">Contato</a></li>
        <li class="item mobile-login"><a href="../login/login.html">Login</a></li>
      </ul>
    </nav>
  </header>

    <main class="reserva-page">
        <section class="reserva-hero" aria-labelledby="titulo-reserva">
            <h2 id="titulo-reserva">Reserve sua Mesa</h2>
            <p>Garanta seu lugar em nosso ambiente acolhedor</p>

            <div class="reserva-actions" aria-label="Escolha uma ação">
                <a class="reserva-action reserva-action-light" href="../cardapio/cardapio.html">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="9" cy="21" r="1" />
                        <circle cx="20" cy="21" r="1" />
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                    </svg>
                    Comprar Café
                </a>

                <a class="reserva-action reserva-action-active" href="reserva.html" aria-current="page">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    Reservar Mesa
                </a>
            </div>
        </section>

        <section class="reserva-card" aria-label="Formulário de reserva">
            <form class="reserva-form" action="#" method="post">
                <div class="form-row">
                    <div class="campo">
                        <label for="data">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <rect x="3" y="4" width="18" height="18" rx="2" />
                                <line x1="16" y1="2" x2="16" y2="6" />
                                <line x1="8" y1="2" x2="8" y2="6" />
                                <line x1="3" y1="10" x2="21" y2="10" />
                            </svg>
                            Data
                        </label>
                        <input type="date" id="data" name="data" required>
                    </div>

                    <div class="campo">
                        <label for="horario">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12 6 12 12 16 14" />
                            </svg>
                            Horário
                        </label>
                        <input type="time" id="horario" name="horario" required>
                    </div>
                </div>

                <div class="campo">
                    <label for="pessoas">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg>
                        Número de pessoas
                    </label>
                    <input type="number" id="pessoas" name="pessoas" min="1" max="20" required>
                </div>

                <div class="campo">
                    <label for="nome">Nome completo</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" autocomplete="name" required>
                </div>

                <div class="campo">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" inputmode="numeric"
                        maxlength="15" autocomplete="tel" required>
                </div>

                <div class="campo">
                    <label for="observacoes">Observações (opcional)</label>
                    <textarea id="observacoes" name="observacoes" placeholder="Alguma preferência especial?"></textarea>
                </div>

                <button class="reserva-submit" type="submit">Confirmar Reserva</button>
                <p class="reserva-note">Você receberá uma confirmação por e-mail e SMS</p>
            </form>
        </section>
    </main>

    <script src="../../components/header/header.js"></script>
    <script src="reserva.js"></script>
</body>

</html>
